name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-linux
            os: ubuntu-latest
            asset_os: linux
            asset_arch: x86_64
          - target: aarch64-linux
            os: ubuntu-latest
            asset_os: linux
            asset_arch: aarch64
          - target: x86_64-macos
            os: macos-latest
            asset_os: macos
            asset_arch: x86_64
          - target: aarch64-macos
            os: macos-latest
            asset_os: macos
            asset_arch: aarch64
          - target: x86_64-windows
            os: ubuntu-latest
            asset_os: windows
            asset_arch: x86_64
          - target: aarch64-windows
            os: ubuntu-latest
            asset_os: windows
            asset_arch: aarch64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe

      - name: Package (tar.gz)
        if: matrix.asset_os != 'windows'
        run: |
          cd zig-out/bin
          tar czf ../../sniff-${{ github.ref_name }}-${{ matrix.asset_os }}-${{ matrix.asset_arch }}.tar.gz sniff

      - name: Package (zip)
        if: matrix.asset_os == 'windows'
        run: |
          cd zig-out/bin
          zip ../../sniff-${{ github.ref_name }}-${{ matrix.asset_os }}-${{ matrix.asset_arch }}.zip sniff.exe

      - uses: actions/upload-artifact@v4
        with:
          name: sniff-${{ matrix.asset_os }}-${{ matrix.asset_arch }}
          path: sniff-${{ github.ref_name }}-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            sniff-*.tar.gz
            sniff-*.zip
